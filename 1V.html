<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Africa V1 | السيادة الرقمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #030303; color: #fff; margin: 0; overflow-x: hidden; }
        
        /* الثعبان الحي المحيط بالاسم */
        .snake-logo-box { position: relative; width: 360px; height: 200px; display: flex; align-items: center; justify-content: center; }
        .platform-title { font-size: 2.4rem; font-weight: 900; z-index: 10; text-align: center; color: #fff; text-shadow: 0 0 15px rgba(34, 197, 94, 0.5); line-height: 1.1; }
        
        .snake-wrap {
            position: absolute; width: 100%; height: 100%; z-index: 5;
            filter: drop-shadow(0 0 12px #22c55e);
        }
        .snake-path {
            fill: none; stroke: #22c55e; stroke-width: 7; stroke-linecap: round;
            stroke-dasharray: 1200; stroke-dashoffset: 1200;
            animation: draw-snake 4s ease-out forwards, snake-slither 2.5s infinite 4s;
        }
        @keyframes draw-snake { to { stroke-dashoffset: 0; } }
        @keyframes snake-slither {
            0%, 100% { transform: scale(1); stroke: #22c55e; }
            50% { transform: scale(1.02); stroke: #4ade80; filter: brightness(1.2); }
        }

        .input-box { background: #0d0d0d; border: 1px solid #1f1f1f; border-radius: 12px; padding: 16px; width: 100%; color: white; outline: none; transition: 0.3s; }
        .input-box:focus { border-color: #22c55e; box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }
        .btn-main { background: linear-gradient(90deg, #16a34a, #22c55e); color: white; font-weight: 900; padding: 16px; border-radius: 15px; width: 100%; transition: 0.4s; border: none; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(22, 163, 74, 0.4); cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- الشاشة الأولى: تسجيل الدخول أو الإنشاء -->
    <div id="auth-screen" class="min-h-screen flex flex-col items-center justify-center p-6">
        
        <!-- شعار الثعبان والاسم -->
        <div class="snake-logo-box mb-8">
            <svg class="snake-wrap" viewBox="0 0 350 200">
                <path class="snake-path" d="M30,100 Q30,30 175,30 T320,100 T175,170 T30,100 M305,95 L325,100 L305,105" />
            </svg>
            <h1 class="platform-title">تبرعات قارة<br>أفريقيا</h1>
        </div>

        <div id="form-content" class="w-full max-w-[370px] space-y-5">
            <div class="flex gap-2 p-1.5 bg-zinc-900/60 rounded-2xl border border-zinc-800">
                <button onclick="setTab('login')" id="tab-l" class="flex-1 py-3 rounded-xl bg-zinc-800 font-bold">دخول</button>
                <button onclick="setTab('signup')" id="tab-s" class="flex-1 py-3 rounded-xl text-zinc-500 font-bold">إنشاء حساب</button>
            </div>

            <div class="space-y-3">
                <div id="signup-extra" class="hidden">
                    <input type="text" id="full-name" placeholder="اسم المنشئ بالكامل" class="input-box mb-2">
                </div>
                <input type="text" id="email" placeholder="البريد السيادي" class="input-box text-left" dir="ltr">
                <input type="password" id="pass" placeholder="كلمة السر" class="input-box text-left" dir="ltr">
            </div>

            <button onclick="handleAuth()" id="action-btn" class="btn-main">فتح بوابة السيرفر</button>
        </div>

        <!-- بوابة الدفع 100 USDT إلى عنوانك -->
        <div id="payment-screen" class="hidden w-full max-w-[380px] animate-in zoom-in duration-500">
            <div class="bg-zinc-900/40 border border-green-500/30 rounded-[40px] p-8 text-center backdrop-blur-xl">
                <div class="text-green-500 text-4xl mb-4"><i class="fa-solid fa-microchip"></i></div>
                <h2 class="text-xl font-bold mb-2">تفعيل بروتوكول V1</h2>
                <p class="text-zinc-500 text-xs mb-6 italic">يجب إرسال 100 USDT لتفعيل حقوق المنشئ</p>

                <!-- عنوان محفظتك المدمج -->
                <div class="bg-black/80 p-5 rounded-2xl border border-zinc-800 mb-5 text-right">
                    <p class="text-[10px] text-yellow-500 font-bold mb-2 tracking-widest uppercase">عنوان محفظتك (TRC20):</p>
                    <div class="flex items-center gap-3">
                        <code id="my-wallet" class="text-[11px] text-zinc-300 break-all font-mono">TA17kMuebRPDnp46jhTX2R8Tijv6dt8Kug</code>
                        <button onclick="copyMyWallet()" class="bg-yellow-500/10 p-2 rounded-lg"><i class="fa-regular fa-copy text-yellow-500"></i></button>
                    </div>
                </div>

                <input type="text" id="txid" placeholder="أدخل رمز العملية (TXID)" class="input-box mb-4 text-sm border-zinc-800">
                <button onclick="verifyPay()" class="btn-main text-black font-black uppercase">تأكيد الإرسال والتشغيل</button>
                
                <div class="mt-6 flex justify-center gap-4 text-zinc-700 text-sm">
                    <i class="fa-brands fa-bitcoin"></i>
                    <i class="fa-brands fa-ethereum"></i>
                    <i class="fa-solid fa-shield-check"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- واجهة المنشئ (بعد النجاح) -->
    <div id="dashboard" class="hidden min-h-screen">
        <header class="p-5 border-b border-zinc-900 flex justify-between items-center bg-black">
            <span class="font-black text-green-500 tracking-tighter">AFRICA V1</span>
            <span class="text-[10px] bg-green-500/20 text-green-500 px-3 py-1 rounded-full border border-green-500/30">SERVER ACTIVE</span>
        </header>

        <div class="p-8">
            <div class="flex flex-col items-center">
                <div class="w-24 h-24 rounded-full border-4 border-yellow-500 p-1 mb-4">
                    <img id="u-avatar" src="" class="rounded-full bg-zinc-800">
                </div>
                <h2 id="u-name" class="text-2xl font-bold"></h2>
                <p id="u-id" class="text-yellow-500 font-mono text-xs mt-2"></p>
            </div>

            <div class="mt-10 grid grid-cols-1 gap-4">
                <div class="bg-zinc-900/50 p-6 rounded-[30px] border border-zinc-800">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-zinc-500 text-sm">إجمالي التبرعات</span>
                        <i class="fa-solid fa-chart-line text-green-500"></i>
                    </div>
                    <div class="text-3xl font-black">0.00 <span class="text-sm font-normal">USDT</span></div>
                    <button class="w-full mt-6 bg-white text-black py-3 rounded-xl font-bold">بدء حملة تبرع جديدة</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // إعدادات النظام السيادي
        const ROOT_EMAIL = "root.admin@safeguard.africa.int";
        const ROOT_PASS = "Afr#99$Sec_Gate_&_2026!X";
        const WALLET_ADDR = "TA17kMuebRPDnp46jhTX2R8Tijv6dt8Kug";

        let signupMode = false;

        function setTab(mode) {
            signupMode = (mode === 'signup');
            document.getElementById('signup-extra').classList.toggle('hidden', !signupMode);
            document.getElementById('tab-s').className = signupMode ? 'flex-1 py-3 rounded-xl bg-zinc-800 font-bold text-white' : 'flex-1 py-3 rounded-xl text-zinc-500 font-bold';
            document.getElementById('tab-l').className = !signupMode ? 'flex-1 py-3 rounded-xl bg-zinc-800 font-bold text-white' : 'flex-1 py-3 rounded-xl text-zinc-500 font-bold';
        }

        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            if (email === ROOT_EMAIL && pass === ROOT_PASS) {
                launchApp("المنشئ السيادي", "MASTER-ROOT-AFRICA");
            } else if (signupMode) {
                document.getElementById('form-content').classList.add('hidden');
                document.getElementById('payment-screen').classList.remove('hidden');
            } else {
                alert("بيانات الدخول غير مسجلة. يرجى إنشاء حساب وتفعيل العضوية.");
            }
        }

        function copyMyWallet() {
            navigator.clipboard.writeText(WALLET_ADDR);
            alert("تم نسخ عنوان TRC20 الخاص بك ✅");
        }

        function verifyPay() {
            const tx = document.getElementById('txid').value;
            if (tx.length > 15) {
                const name = document.getElementById('full-name').value || "Creator_V1";
                const id = "AFR-" + Math.random().toString(36).substr(2, 9).toUpperCase();
                alert("✅ تم استلام الإشارة من البلوكشين. تفعيل الحساب...");
                launchApp(name, id);
            } else {
                alert("❌ رمز العملية (TXID) غير صالح أو لم يكتمل بعد.");
            }
        }

        function launchApp(name, id) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('u-name').innerText = name;
            document.getElementById('u-id').innerText = "V1-PASS: " + id;
            document.getElementById('u-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${id}`;
        }
    </script>
</body>
</html>
